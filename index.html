<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2029;
    --surface3: #252834;
    --border: #2e3040;
    --accent: #7c6af7;
    --accent2: #5dd4c8;
    --accent3: #f7a26a;
    --danger: #f7647a;
    --success: #5dd4c8;
    --text: #e8eaf2;
    --text2: #9ea4bc;
    --text3: #5e647a;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #12131a 0%, #1a1b26 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .header-meta {
    font-size: 12px;
    color: var(--text3);
    font-weight: 300;
    margin-top: 2px;
  }

  /* OVERALL PROGRESS */
  .overall-progress {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .overall-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    white-space: nowrap;
  }

  .overall-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }

  .overall-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .overall-pct {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--accent2);
    min-width: 40px;
    text-align: right;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 0;
  }

  /* ADD SUBJECT BTN */
  .add-subject-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 2px dashed var(--border);
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    width: 100%;
    margin-bottom: 28px;
    transition: all 0.2s;
  }

  .add-subject-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.06);
  }

  .add-subject-btn .plus {
    width: 26px; height: 26px;
    background: var(--surface2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background 0.2s;
  }

  .add-subject-btn:hover .plus { background: rgba(124,106,247,0.2); }

  /* SUBJECT CARD */
  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    transition: box-shadow 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .subject-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

  .subject-header {
    padding: 20px 22px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .subject-color {
    width: 10px;
    height: 36px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .subject-info { flex: 1; min-width: 0; }

  .subject-name {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .subject-stats {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
    font-weight: 300;
  }

  .subject-progress-wrap {
    flex: 1;
    max-width: 140px;
  }

  .subject-progress-bar {
    height: 5px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .subject-progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .subject-progress-pct {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-align: right;
  }

  .subject-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--surface2);
    color: var(--text3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .icon-btn.danger:hover { background: rgba(247,100,122,0.15); color: var(--danger); }
  .icon-btn.collapse-btn { font-size: 12px; }

  /* CHAPTERS */
  .chapters-wrap {
    border-top: 1px solid var(--border);
    padding: 0 22px 16px;
    display: none;
  }

  .chapters-wrap.open { display: block; }

  .add-chapter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 0 4px;
    cursor: pointer;
    transition: color 0.15s;
    width: 100%;
    text-align: left;
  }

  .add-chapter-btn:hover { color: var(--accent2); }

  .chapter-block {
    margin-top: 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    overflow: hidden;
    animation: slideIn 0.25s ease;
  }

  .chapter-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .chapter-header:hover { background: var(--surface3); }

  .chapter-toggle { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .chapter-toggle.open { transform: rotate(90deg); }

  .chapter-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chapter-progress-mini {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chapter-bar {
    width: 60px;
    height: 4px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }

  .chapter-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .chapter-pct {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    min-width: 28px;
    text-align: right;
  }

  /* TOPICS */
  .topics-wrap {
    border-top: 1px solid var(--border);
    padding: 8px 14px 12px;
    display: none;
  }

  .topics-wrap.open { display: block; }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(46,48,64,0.5);
    animation: slideIn 0.2s ease;
  }

  .topic-row:last-child { border-bottom: none; }

  .topic-check {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    background: transparent;
  }

  .topic-check.done {
    background: var(--success);
    border-color: var(--success);
    color: #0e0f14;
  }

  .topic-label {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-label.done {
    text-decoration: line-through;
    color: var(--text3);
  }

  .topic-del {
    width: 24px; height: 24px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .topic-row:hover .topic-del { background: rgba(247,100,122,0.12); color: var(--danger); }

  .add-topic-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 0 0;
    cursor: pointer;
    transition: color 0.15s;
  }

  .add-topic-btn:hover { color: var(--accent); }

  /* INLINE EDIT */
  .inline-input {
    background: var(--surface3);
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 5px 10px;
    outline: none;
    flex: 1;
  }

  .inline-input::placeholder { color: var(--text3); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    width: 380px;
    max-width: 94vw;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 18px;
    letter-spacing: -0.4px;
  }

  .modal label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text3);
    margin-bottom: 7px;
  }

  .modal input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s;
  }

  .modal input[type="text"]:focus { border-color: var(--accent); }

  .color-picker-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 7px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .color-swatch.selected { border-color: white; transform: scale(1.15); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #8e7ef9; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
  }
  .btn-ghost:hover { background: var(--surface3); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; font-weight: 300; }

  /* BADGE */
  .badge {
    font-size: 10px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    padding: 3px 8px;
    border-radius: 99px;
    background: var(--surface3);
    color: var(--text3);
    letter-spacing: 0.5px;
  }

  .badge.done { background: rgba(93,212,200,0.15); color: var(--accent2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; }
    main { padding: 24px 12px 0; }
    .subject-progress-wrap { max-width: 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div>
        <h1>Syllabus<span>Tracker</span></h1>
        <div class="header-meta" id="headerMeta">Track your academic progress</div>
      </div>
    </div>
  </div>
  <div class="overall-progress">
    <span class="overall-label">Overall</span>
    <div class="overall-bar-wrap">
      <div class="overall-bar-fill" id="overallBar" style="width:0%"></div>
    </div>
    <span class="overall-pct" id="overallPct">0%</span>
  </div>
</header>

<main>
  <button class="add-subject-btn" onclick="openModal()">
    <span class="plus">+</span>
    Add New Subject
  </button>
  <div id="subjectsList"></div>
  <div id="emptyState" class="empty-state">
    <div class="emoji">🎓</div>
    <h3>No subjects yet</h3>
    <p>Click "Add New Subject" to get started!</p>
  </div>
</main>

<!-- ADD SUBJECT MODAL -->
<div class="modal-overlay" id="subjectModal">
  <div class="modal">
    <h2 id="modalTitle">Add Subject</h2>
    <label>Subject Name</label>
    <input type="text" id="subjectNameInput" placeholder="e.g. Mathematics, Physics..." maxlength="50">
    <label>Color</label>
    <div class="color-picker-row" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSubject()">Save Subject</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── COLORS ─────────────────────────────────────
  const COLORS = [
    '#7c6af7','#5dd4c8','#f7a26a','#f7647a',
    '#64c8f7','#c87cf7','#f7e56a','#82f79f',
    '#f7a0c8','#a0c8f7'
  ];

  let data = { subjects: [] };
  let editingSubjectId = null;
  let selectedColor = COLORS[0];

  // ─── STORAGE ─────────────────────────────────────
  function save() {
    localStorage.setItem('syllabusTracker_v2', JSON.stringify(data));
    render();
  }

  function load() {
    try {
      const raw = localStorage.getItem('syllabusTracker_v2');
      if (raw) data = JSON.parse(raw);
    } catch(e) { data = { subjects: [] }; }
  }

  function genId() {
    return Math.random().toString(36).slice(2, 10);
  }

  // ─── PROGRESS CALCS ──────────────────────────────
  function subjectProgress(subject) {
    let total = 0, done = 0;
    for (const ch of subject.chapters) {
      for (const t of ch.topics) {
        total++;
        if (t.done) done++;
      }
    }
    return { total, done, pct: total === 0 ? 0 : Math.round(done / total * 100) };
  }

  function overallProgress() {
    let total = 0, done = 0;
    for (const s of data.subjects) {
      const p = subjectProgress(s);
      total += p.total;
      done += p.done;
    }
    return { total, done, pct: total === 0 ? 0 : Math.round(done / total * 100) };
  }

  // ─── MODAL ───────────────────────────────────────
  function buildColorPicker() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
      sw.style.background = c;
      sw.onclick = () => {
        selectedColor = c;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
      };
      cp.appendChild(sw);
    });
  }

  function openModal(subjectId = null) {
    editingSubjectId = subjectId;
    const modal = document.getElementById('subjectModal');
    const input = document.getElementById('subjectNameInput');
    const title = document.getElementById('modalTitle');

    if (subjectId) {
      const s = data.subjects.find(s => s.id === subjectId);
      input.value = s.name;
      selectedColor = s.color;
      title.textContent = 'Edit Subject';
    } else {
      input.value = '';
      selectedColor = COLORS[Math.floor(Math.random() * COLORS.length)];
      title.textContent = 'Add Subject';
    }

    buildColorPicker();
    modal.classList.add('open');
    setTimeout(() => input.focus(), 100);
  }

  function closeModal() {
    document.getElementById('subjectModal').classList.remove('open');
    editingSubjectId = null;
  }

  function saveSubject() {
    const name = document.getElementById('subjectNameInput').value.trim();
    if (!name) { showToast('Please enter a subject name'); return; }

    if (editingSubjectId) {
      const s = data.subjects.find(s => s.id === editingSubjectId);
      s.name = name;
      s.color = selectedColor;
      showToast('Subject updated ✓');
    } else {
      data.subjects.push({ id: genId(), name, color: selectedColor, chapters: [], collapsed: false });
      showToast('Subject added ✓');
    }
    closeModal();
    save();
  }

  document.getElementById('subjectModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('subjectNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveSubject();
    if (e.key === 'Escape') closeModal();
  });

  // ─── SUBJECTS ────────────────────────────────────
  function deleteSubject(id) {
    if (!confirm('Delete this subject and all its content?')) return;
    data.subjects = data.subjects.filter(s => s.id !== id);
    showToast('Subject deleted');
    save();
  }

  function toggleSubject(id) {
    const s = data.subjects.find(s => s.id === id);
    if (s) { s.collapsed = !s.collapsed; save(); }
  }

  // ─── CHAPTERS ────────────────────────────────────
  function addChapter(subjectId) {
    const wrap = document.getElementById('addChInput_' + subjectId);
    if (wrap.style.display === 'flex') {
      wrap.style.display = 'none'; return;
    }
    wrap.style.display = 'flex';
    wrap.querySelector('input').focus();
  }

  function confirmAddChapter(subjectId) {
    const wrap = document.getElementById('addChInput_' + subjectId);
    const val = wrap.queryS
